name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: src/go.sum

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_RELEASE_HOMEBREW_SCOOP_TOKEN: ${{ secrets.CLI_RELEASE_HOMEBREW_SCOOP_TOKEN }}

      - name: Upload artifacts for testing
        uses: actions/upload-artifact@v5
        with:
          name: phase-cli-release
          path: dist/
          retention-days: 30

  test-install:
    needs: [release]
    uses: ./.github/workflows/test-install-post-build.yml
    with:
      version: ${{ needs.release.outputs.version }}

  docker:
    if: needs.release.outputs.prerelease == 'false'
    needs: [release]
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}

  test-install-script:
    needs: [release]
    uses: ./.github/workflows/test-install-script.yml
    with:
      version: ${{ needs.release.outputs.version }}
