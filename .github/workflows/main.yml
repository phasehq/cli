name: "Test, Build, Package the Phase CLI"

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:

  # Run Go tests and vet
  test:
    uses: ./.github/workflows/test.yml

  # Extract version from Go source
  version:
    uses: ./.github/workflows/version.yml

  # Cross-compile for all platforms
  build:
    needs: [test, version]
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}

  # Package binaries into .deb, .rpm, .apk
  package:
    needs: [build, version]
    uses: ./.github/workflows/package.yml
    with:
      version: ${{ needs.version.outputs.version }}

  # Test binaries and packages on Linux distros
  test-install:
    needs: [build, package, version]
    uses: ./.github/workflows/test-install-post-build.yml
    with:
      version: ${{ needs.version.outputs.version }}

  # Attach release assets to GitHub release
  attach-to-release:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: [build, package, version]
    uses: ./.github/workflows/attach-to-release.yml
    with:
      version: ${{ needs.version.outputs.version }}

  # Build and push Docker image
  docker:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: [version]
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}

  # Test install.sh script end-to-end after release assets are published
  test-install-script:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: [attach-to-release, version]
    uses: ./.github/workflows/test-install-script.yml
    with:
      version: ${{ needs.version.outputs.version }}
