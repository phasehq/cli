name: "Package (deb/rpm/apk)"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  package:
    name: Build packages (deb/rpm/apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install FPM
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ruby ruby-dev build-essential > /dev/null
          sudo gem install fpm --no-document

      - name: Download binaries
        uses: actions/download-artifact@v5
        with:
          name: phase-cli-binaries
          path: dist

      - name: Build packages
        run: |
          chmod +x dist/phase-cli_linux_*
          VERSION="${{ inputs.version }}" bash scripts/package.sh

      - name: Upload packages
        uses: actions/upload-artifact@v5
        with:
          name: phase-cli-packages
          path: dist/pkg/
          retention-days: 7
