name: "Test Installation on Linux"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  test_install_x86_64:
    name: Test on Linux distros (x86_64)
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # DEB package installs
          - { image: "ubuntu:22.04", name: ubuntu-22.04, install: deb }
          - { image: "ubuntu:24.04", name: ubuntu-24.04, install: deb }
          - { image: "debian:bookworm", name: debian-bookworm, install: deb }
          - { image: "debian:trixie", name: debian-trixie, install: deb }
          # RPM package installs
          - { image: "fedora:41", name: fedora-41, install: rpm }
          - { image: "fedora:42", name: fedora-42, install: rpm }
          - { image: "rockylinux:9", name: rocky-9, install: rpm }
          - { image: "amazonlinux:2023", name: amazonlinux-2023, install: rpm }
          # APK package installs
          - { image: "alpine:3.21", name: alpine-3.21, install: apk }
          - { image: "alpine:3.22", name: alpine-3.22, install: apk }
          # Raw binary install
          - { image: "archlinux:latest", name: archlinux-latest, install: binary }
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: phase-cli-release
          path: release

      - name: Run tests in ${{ matrix.name }}
        run: |
          set -e
          chmod +x release/phase_cli_${{ inputs.version }}_linux_amd64
          docker run --rm \
            -v "${PWD}/release":/release \
            ${{ matrix.image }} \
            /bin/sh -c "
              echo '=== Installing (${{ matrix.install }}) ==='
              case '${{ matrix.install }}' in
                deb)
                  dpkg -i /release/phase_cli_${{ inputs.version }}_linux_amd64.deb
                  ;;
                rpm)
                  rpm -i /release/phase_cli_${{ inputs.version }}_linux_amd64.rpm
                  ;;
                apk)
                  apk add --allow-untrusted /release/phase_cli_${{ inputs.version }}_linux_amd64.apk
                  ;;
                binary)
                  install -Dm755 /release/phase_cli_${{ inputs.version }}_linux_amd64 /usr/local/bin/phase
                  ;;
              esac

              echo '=== Verify phase exists ==='
              command -v phase

              echo '=== phase --version ==='
              phase --version

              echo '=== phase --help (head) ==='
              phase --help | head -20

              echo '=== version check ==='
              RETURNED_VERSION=\$(phase --version | awk '{print \$1}')
              if [ \"\$RETURNED_VERSION\" != \"${{ inputs.version }}\" ]; then
                echo \"Version mismatch: expected ${{ inputs.version }}, got \$RETURNED_VERSION\"
                exit 1
              fi

              echo 'All checks passed'
            "
        shell: bash

  test_install_arm64:
    name: Test on Linux distros (ARM64)
    continue-on-error: true
    runs-on: ubuntu-22.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: "ubuntu:24.04", name: ubuntu-24.04, install: deb }
          - { image: "debian:bookworm", name: debian-bookworm, install: deb }
          - { image: "fedora:42", name: fedora-42, install: rpm }
          - { image: "alpine:3.21", name: alpine-3.21, install: apk }
          - { image: "amazonlinux:2023", name: amazonlinux-2023, install: rpm }
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: phase-cli-release
          path: release

      - name: Run tests in ${{ matrix.name }} (arm64)
        run: |
          set -e
          chmod +x release/phase_cli_${{ inputs.version }}_linux_arm64
          docker run --rm \
            -v "${PWD}/release":/release \
            ${{ matrix.image }} \
            /bin/sh -c "
              echo '=== Installing (${{ matrix.install }}) ==='
              case '${{ matrix.install }}' in
                deb)
                  dpkg -i /release/phase_cli_${{ inputs.version }}_linux_arm64.deb
                  ;;
                rpm)
                  rpm -i /release/phase_cli_${{ inputs.version }}_linux_arm64.rpm
                  ;;
                apk)
                  apk add --allow-untrusted /release/phase_cli_${{ inputs.version }}_linux_arm64.apk
                  ;;
                binary)
                  install -Dm755 /release/phase_cli_${{ inputs.version }}_linux_arm64 /usr/local/bin/phase
                  ;;
              esac

              echo '=== Verify phase exists ==='
              command -v phase

              echo '=== phase --version ==='
              phase --version

              echo '=== phase --help (head) ==='
              phase --help | head -20

              echo '=== version check ==='
              RETURNED_VERSION=\$(phase --version | awk '{print \$1}')
              if [ \"\$RETURNED_VERSION\" != \"${{ inputs.version }}\" ]; then
                echo \"Version mismatch: expected ${{ inputs.version }}, got \$RETURNED_VERSION\"
                exit 1
              fi

              echo 'All checks passed'
            "
        shell: bash
